<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AlnRoxieSoft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        color: #222;
        overflow: hidden;
    }

    /* Header / Logo */
    #header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 90px;
        background: #1e1e1e;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        font-weight: bold;
        z-index: 10;
        border-bottom: 3px solid #444;
    }

    /* Scrollable app table area */
    #appArea {
        position: fixed;
        top: 90px;
        bottom: 160px;
        left: 0;
        right: 0;
        overflow-y: auto;
        padding: 10px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    td {
        padding: 10px;
        vertical-align: top;
    }

    .iconCell {
        width: 160px;
        text-align: center;
        vertical-align: top;
    }

    .iconCell img {
        width: 144px;
        height: 144px;
        cursor: pointer;
        margin-top: 0;
    }

    .titleCell {
        font-size: 24px;
        font-weight: bold;
        padding-bottom: 5px;
    }

    .descCell {
        font-size: 16px;
        color: #333;
    }

    /* Footer instructions */
    #footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 160px;
        background: #1e1e1e;
        color: white;
        padding: 15px;
        font-size: 15px;
        overflow-y: auto;
        border-top: 3px solid #444;
    }

    #footer h3 {
        margin-top: 0;
        font-size: 20px;
        text-align: center;
    }
</style>
</head>

<body>

<div id="header">AlnRoxieSoft</div>

<div id="appArea">
    <table id="appTable"></table>
</div>

<div id="footer">
    <h3>Add This Site to Your Home Screen</h3>

    <b>Android (Chrome):</b>
    <ol>
        <li>Open the browser menu (⋮).</li>
        <li>Select <b>Add to Home screen</b>.</li>
        <li>Confirm the name and tap <b>Add</b>.</li>
    </ol>

    <b>iOS (Safari):</b>
    <ol>
        <li>Tap the <b>Share</b> icon (square with arrow).</li>
        <li>Select <b>Add to Home Screen</b>.</li>
        <li>Tap <b>Add</b> in the top‑right corner.</li>
    </ol>
</div>

<script>
    // -----------------------------
    // App Definitions (Your Data)
    // -----------------------------
    const apps = [
        {
            IconPath: "MiscTools/Images/Insulin144x144.png",
            AppTitle: "Insulin Bolus Calculator",
            AppURL: "MiscTools/InsulinBolusCalculator.htm",
            AppDesc: "This app is designed for users of slow acting insulin, allowing dose to be calculated from their current blood sugar, their ratios, and the carbs of the planned meal. A menu of fast food meals is provided, which can be added to."
        },
        {
            IconPath: "MiscTools/Images/FastInsulin144x144.png",
            AppTitle: "Fast Acting Insulin Bolus Calculator",
            AppURL: "MiscTools/FastActingInsulinCalculator.htm",
            AppDesc: "This app is designed for users of fast acting insulin, allowing dose to be calculated from their current blood sugar, their ratios, and the carbs of the planned meal. A menu of fast food meals is provided, which can be added to."
        }
    ];

    // -----------------------------
    // Build the table dynamically
    // -----------------------------
    const table = document.getElementById("appTable");

    apps.forEach(app => {
        // Row 1
        const row1 = document.createElement("tr");

        const iconCell = document.createElement("td");
        iconCell.className = "iconCell";
        iconCell.rowSpan = 2;

        const img = document.createElement("img");
        img.src = app.IconPath;
        img.onclick = () => window.open(app.AppURL, "_blank");

        iconCell.appendChild(img);

        const titleCell = document.createElement("td");
        titleCell.className = "titleCell";
        titleCell.textContent = app.AppTitle;

        row1.appendChild(iconCell);
        row1.appendChild(titleCell);

        // Row 2
        const row2 = document.createElement("tr");

        const descCell = document.createElement("td");
        descCell.className = "descCell";
        descCell.textContent = app.AppDesc;

        row2.appendChild(descCell);

        // Add both rows
        table.appendChild(row1);
        table.appendChild(row2);
    });
</script>

</body>
</html>
